<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Toggle</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Pliant:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="heading">
            <h2>Create Account</h2>
            <p>Click the eye icon to toggle password visibility</p>
        </div>

        <form action="#" id="myform">
            <div class="field">
                <label for="username">Email</label>
                <input type="text" name="username" id="username" placeholder="Enter your username/email">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="password" placeholder="Enter your password">
                    <i class="bi bi-eye-slash" id="eye-icon"></i>
                </div>
            </div>

            <div class="field">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="confirm-password" placeholder="Confirm your password">
                    <i class="bi bi-eye-slash" id="eye-icon2"></i>
                </div>
            </div>

            <button type="submit" class="btn" id="submit">Log in</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>

</html>
